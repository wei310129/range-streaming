<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斷點續傳 Demo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 12px 20px;
            background: #161b27;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-shrink: 0;
        }
        header h1 { font-size: 1rem; color: #63b3ed; }
        header p  { font-size: 0.75rem; color: #4a5568; }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left: file list ── */
        .files-panel {
            border-right: 1px solid #2d3748;
            background: #161b27;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-title {
            padding: 10px 14px 8px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #4a5568;
            border-bottom: 1px solid #1a202c;
        }
        .file-scroll { overflow-y: auto; flex: 1; padding: 6px; }
        .file-item {
            padding: 8px 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 3px;
            border: 1px solid transparent;
            transition: background 0.1s, border-color 0.1s;
        }
        .file-item:hover { background: #1e2535; }
        .file-item.active { background: #1a2e4a; border-color: #2b4c7e; }
        .file-item .f-name { font-size: 0.82rem; color: #e2e8f0; word-break: break-all; }
        .file-item .f-size { font-size: 0.7rem; color: #4a5568; }
        .no-files { padding: 20px 10px; text-align: center; font-size: 0.78rem; color: #4a5568; line-height: 1.8; }
        .no-files code { color: #63b3ed; }

        /* ── Right: main area ── */
        .main-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Selected file info */
        .file-header {
            padding: 12px 20px;
            background: #161b27;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .file-header .fh-icon { font-size: 1.4rem; }
        .file-header .fh-name { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
        .file-header .fh-size { font-size: 0.75rem; color: #718096; margin-top: 1px; }
        .fh-placeholder { color: #4a5568; font-size: 0.85rem; }

        /* Download area */
        .download-area {
            padding: 24px 24px 16px;
            border-bottom: 1px solid #2d3748;
            flex-shrink: 0;
        }

        /* Progress track */
        .progress-track {
            height: 28px;
            background: #1a202c;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2d3748;
            margin-bottom: 10px;
        }
        .prog-seg {
            position: absolute;
            top: 0;
            height: 100%;
            transition: width 0.15s linear;
        }
        .prog-seg.initial { background: linear-gradient(90deg, #2b6cb0, #3182ce); }
        .prog-seg.resumed { background: linear-gradient(90deg, #276749, #38a169); left: var(--resume-left); }
        .prog-track-label {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }

        /* Progress numbers */
        .progress-numbers {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 0.78rem;
        }
        .prog-received { color: #63b3ed; font-family: monospace; }
        .prog-speed    { color: #718096; font-family: monospace; }
        .prog-total    { color: #4a5568; font-family: monospace; }

        /* Status badge */
        .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            min-height: 28px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-idle         { background: #2d3748; color: #a0aec0; }
        .badge-downloading  { background: #1a365d; color: #63b3ed; animation: pulse-blue 1.5s infinite; }
        .badge-interrupted  { background: #742a2a; color: #fc8181; animation: shake 0.4s ease; }
        .badge-resuming     { background: #1c4532; color: #68d391; animation: pulse-green 1.5s infinite; }
        .badge-done         { background: #1c4532; color: #68d391; }

        @keyframes pulse-blue  { 0%,100%{opacity:1} 50%{opacity:.6} }
        @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:.7} }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-6px)}
            40%{transform:translateX(6px)}
            60%{transform:translateX(-4px)}
            80%{transform:translateX(4px)}
        }

        .status-detail { font-size: 0.78rem; color: #718096; }
        .status-detail.highlight { color: #f6ad55; font-weight: 600; }

        /* Buttons */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: opacity 0.1s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.35; cursor: default; transform: none; }
        .btn-download { background: #3182ce; color: white; }
        .btn-download:hover:not(:disabled) { background: #2b6cb0; }
        .btn-resume   { background: #276749; color: #9ae6b4; }
        .btn-resume:hover:not(:disabled)   { background: #22543d; }
        .btn-cancel   { background: #2d3748; color: #a0aec0; }
        .btn-cancel:hover:not(:disabled)   { background: #4a5568; }
        .btn-reset    { background: #2d3748; color: #718096; }
        .btn-reset:hover:not(:disabled)    { background: #4a5568; }

        /* Legend */
        .legend {
            display: flex;
            gap: 14px;
            margin-top: 10px;
            font-size: 0.68rem;
            color: #4a5568;
        }
        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            display: inline-block;
            margin-right: 4px;
        }

        /* Log */
        .log-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 12px 20px;
        }
        .log-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #4a5568;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-clear {
            font-size: 0.65rem;
            padding: 2px 7px;
            background: #2d3748;
            color: #718096;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .log-clear:hover { color: #a0aec0; }
        .log-box {
            flex: 1;
            overflow-y: auto;
            background: #0d1117;
            border: 1px solid #1e2535;
            border-radius: 5px;
            padding: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.72rem;
            line-height: 1.5;
        }
        .le {
            padding: 3px 8px;
            border-radius: 3px;
            margin-bottom: 2px;
            border-left: 3px solid transparent;
        }
        .le-req  { border-color: #3182ce; }
        .le-206  { border-color: #38a169; background: #1c453211; }
        .le-200  { border-color: #4299e1; }
        .le-warn { border-color: #e53e3e; background: #742a2a11; }
        .le-ok   { border-color: #38a169; background: #1c453222; }
        .le-info { border-color: #805ad5; }

        .t-time  { color: #2d3748; }
        .t-req   { color: #4299e1; }
        .t-200   { color: #63b3ed; font-weight:700; }
        .t-206   { color: #68d391; font-weight:700; }
        .t-warn  { color: #fc8181; font-weight:700; }
        .t-ok    { color: #68d391; font-weight:700; }
        .t-range { color: #f6ad55; }
        .t-dim   { color: #4a5568; }
        .t-info  { color: #b794f4; }
    </style>
</head>
<body>

<header>
    <h1>斷點續傳 Demo</h1>
    <p>模擬下載中斷後，前端自動偵測並以 HTTP Range Request 從斷點繼續</p>
</header>

<div class="layout">

    <!-- File list -->
    <div class="files-panel">
        <div class="panel-title">PDF 檔案</div>
        <div class="file-scroll" id="file-list">
            <div class="no-files">載入中...</div>
        </div>
    </div>

    <!-- Main -->
    <div class="main-panel">

        <!-- Selected file header -->
        <div class="file-header" id="file-header">
            <span class="fh-placeholder">← 選擇一個 PDF 檔案開始</span>
        </div>

        <!-- Download area -->
        <div class="download-area">

            <!-- Progress bar -->
            <div class="progress-track" id="progress-track">
                <div class="prog-seg initial" id="seg-initial" style="width:0%"></div>
                <div class="prog-seg resumed" id="seg-resumed" style="width:0%; --resume-left:0%"></div>
                <div class="prog-track-label" id="prog-pct">0%</div>
            </div>

            <!-- Numbers -->
            <div class="progress-numbers">
                <span class="prog-received" id="prog-received">0 B / —</span>
                <span class="prog-speed"    id="prog-speed"></span>
                <span class="prog-total"    id="prog-total"></span>
            </div>

            <!-- Status -->
            <div class="status-line">
                <span class="badge badge-idle" id="status-badge">⬤ 待機</span>
                <span class="status-detail"   id="status-detail">選擇檔案後點擊下載</span>
            </div>

            <!-- Actions -->
            <div class="actions" id="actions">
                <button class="btn btn-download" id="btn-download" onclick="startDownload()" disabled>⬇ 開始下載</button>
                <button class="btn btn-resume"   id="btn-resume"   onclick="resumeDownload()" style="display:none">⟳ 從斷點續傳</button>
                <button class="btn btn-cancel"   id="btn-cancel"   onclick="cancelDownload()" style="display:none">✕ 中止</button>
                <button class="btn btn-reset"    id="btn-reset"    onclick="resetDownload()"  style="display:none">↺ 重置</button>
            </div>

            <!-- Legend -->
            <div class="legend" id="legend" style="display:none">
                <span><span class="legend-dot" style="background:#3182ce"></span>初次下載</span>
                <span><span class="legend-dot" style="background:#38a169"></span>續傳部分</span>
                <span><span class="legend-dot" style="background:#2d3748"></span>尚未接收</span>
            </div>

        </div>

        <!-- Log -->
        <div class="log-area">
            <div class="log-title">
                Request / Event Log
                <button class="log-clear" onclick="clearLog()">清除</button>
            </div>
            <div class="log-box" id="log">
                <div class="le le-info"><span class="t-info">等待操作...</span></div>
            </div>
        </div>

    </div>
</div>

<script>
/*
 * ══════════════════════════════════════════════════════════════
 *  斷點續傳（Resumable Download）實作原理
 * ══════════════════════════════════════════════════════════════
 *
 *  HTTP Range Request 是瀏覽器與伺服器之間用來「只取檔案某段」的機制：
 *
 *    第一次下載（一般請求）：
 *      Request:  GET /api/pdf/file.pdf
 *      Response: 200 OK, Content-Length: 10240, body: [0 ~ 10239 bytes]
 *
 *    中斷後續傳（Range 請求）：
 *      Request:  GET /api/pdf/file.pdf
 *                Range: bytes=4096-          ← 從第 4096 byte 開始，不指定結尾表示取到最後
 *      Response: 206 Partial Content
 *                Content-Range: bytes 4096-10239/10240   ← 本次範圍 / 總大小
 *                Content-Length: 6144                    ← 本次回傳的 byte 數
 *                body: [4096 ~ 10239 bytes]
 *
 *  前端流程：
 *    1. fetch() 不帶 Range → 用 ReadableStream 逐 chunk 接收
 *    2. 模擬中斷 → 停止讀取，記住已收到的 byte 數（S.received）
 *    3. fetch() 帶 Range: bytes=S.received- → 從斷點繼續接收
 *    4. 將兩次的 chunks 合併為一個 Blob → 觸發瀏覽器存檔
 */

// 下載狀態機
// phase 轉換：idle → downloading → interrupted → resuming → done
const S = {
    file:          null,   // 當前選擇的檔案 { name, size }
    chunks:        [],     // 所有已收到的資料片段（Uint8Array[]），兩段請求共用此陣列
    received:      0,      // 目前累計收到的 bytes 數（同時也是續傳時的斷點位置）
    resumeFrom:    0,      // 記錄第二段請求的起點，用於進度條顯示「初次/續傳」兩色區塊
    interruptAt:   0,      // 【模擬用】預設在此 byte 數觸發中斷
    phase:         'idle', // 狀態機：idle | downloading | interrupted | resuming | done
    abort:         null,   // AbortController 實例，用來主動中止 fetch 連線
    speedTs:       0,      // 速度計算用：上次更新的時間戳
    speedBytes:    0,      // 速度計算用：上次更新後累計的 bytes
    speed:         0,      // 目前計算出的下載速度（bytes/sec）
    retryTimer:    null,   // 自動續傳的 setTimeout handle
    userCancelled: false,  // 使用者主動點「中止」時設為 true，阻止自動續傳
    retryCount:    0,      // 在同一個 byte 位置連續失敗的次數
    lastFailedAt:  -1,     // 上次失敗時的 S.received（-1 = 尚無失敗記錄）
};

const MAX_RETRIES = 3;  // 同一位置最多自動重試幾次

// ════════════════════════════════════════════════════════════
// 【重要】斷點續傳是真實行為，不是 UI 假象
// ════════════════════════════════════════════════════════════
//
// 常見疑問：進度條從中間繼續增長，是不是只是把數字往前加，
//           實際上還是從頭重新下載？
//
// 答：不是。這是真實的 HTTP Range Request，伺服器只傳送剩餘的 bytes。
//
// 驗證方式（開啟 DevTools → Network tab）：
//   第一次請求：
//     Request  Headers: 無 Range
//     Response Headers: 200 OK, Content-Length: 10,485,760（完整大小）
//     Transferred:      ~4.2 MB（中斷時已收到的量）
//
//   續傳請求：
//     Request  Headers: Range: bytes=4300000-          ← 只請求剩餘部分
//     Response Headers: 206 Partial Content
//                       Content-Range: bytes 4300000-10485759/10485760
//                       Content-Length: 6,185,760       ← 只有剩餘的量
//     Transferred:      ~6.2 MB（剩餘部分，兩次加總 ≈ 完整大小）
//
// 記憶體中的資料結構：
//   S.chunks = [
//     Uint8Array(bytes 0 ~ 4,299,999),   ← 第一次下載存入
//     Uint8Array(bytes 4,300,000 ~ ...),  ← 續傳存入（接續在同一個陣列）
//   ]
//   最後 new Blob(S.chunks) 將兩段合併成完整檔案。
// ════════════════════════════════════════════════════════════

// ─────────────────────────────────────────────────────────
// 檔案列表
// ─────────────────────────────────────────────────────────

/**
 * 頁面載入時呼叫，向 API Server 取得 file-storage/ 內的 PDF 清單。
 * 回傳格式：[{ name: "file.pdf", size: 1234567 }, ...]
 * size 之後用來計算進度百分比與 Range 起訖位置。
 */
async function loadFiles() {
    try {
        const files = await fetch('/api/files').then(r => r.json());
        const el = document.getElementById('file-list');
        if (!files.length) {
            el.innerHTML = `<div class="no-files">沒有 PDF 檔案<br>請放入 <code>file-storage/</code></div>`;
            return;
        }
        // 將 size 寫進 onclick 參數，selectFile 不需要再打 API 查詢大小
        el.innerHTML = files.map(f =>
            `<div class="file-item" id="fi-${CSS.escape(f.name)}" onclick="selectFile('${f.name}',${f.size})">
                <span class="f-name">${f.name}</span>
                <span class="f-size">${fmt(f.size)}</span>
            </div>`
        ).join('');
    } catch {
        document.getElementById('file-list').innerHTML =
            `<div class="no-files">無法連線 API Server</div>`;
    }
}

/**
 * 使用者點擊左側檔案列表時呼叫。
 * 將選擇的檔案資訊存入狀態，並重置所有進度 UI。
 * 下載進行中時點擊其他檔案無效（避免狀態混亂）。
 */
function selectFile(name, size) {
    // 下載或續傳進行中時禁止切換檔案（S.chunks 還有未完成的資料）
    if (S.phase === 'downloading' || S.phase === 'resuming') return;

    S.file = { name, size };
    resetState();  // 清除上一次的 chunks 和進度

    document.querySelectorAll('.file-item').forEach(e => e.classList.remove('active'));
    document.getElementById('fi-' + CSS.escape(name))?.classList.add('active');

    document.getElementById('file-header').innerHTML =
        `<span class="fh-icon">📄</span>
         <div>
           <div class="fh-name">${name}</div>
           <div class="fh-size">${fmt(size)} &nbsp;·&nbsp; ${size.toLocaleString()} bytes</div>
         </div>`;

    document.getElementById('btn-download').disabled = false;
    document.getElementById('prog-total').textContent = fmt(size);
    setBadge('idle', '待機', '點擊「開始下載」');
    log('info', `選擇 ${name}`, fmt(size));
}

// ─────────────────────────────────────────────────────────
// 下載流程
// ─────────────────────────────────────────────────────────

/**
 * 第一段下載：不帶 Range header，從 byte 0 開始。
 *
 * 流程：
 *   1. 建立 AbortController（用於之後模擬中斷）
 *   2. fetch() 取得 response，確認回應正常（200 OK）
 *   3. 從 response.body 取得 ReadableStream reader
 *   4. 進入 readStream() 逐 chunk 讀取
 *   5. readStream() 在 interruptAt 處呼叫 abort() 中斷
 */
async function startDownload() {
    if (!S.file) return;

    resetState();
    S.phase = 'downloading';

    // 【僅 Demo 用】隨機設定模擬中斷點在 25%～65% 之間
    // 真實場景不需要這行；中斷由網路問題觸發，不是人為設定
    S.interruptAt = Math.floor(S.file.size * (0.25 + Math.random() * 0.4));

    // AbortController：可在任意時刻中止 fetch
    // 呼叫 S.abort.abort() → fetch 拋出 AbortError → catch 攔截 → 進入中斷狀態
    S.abort      = new AbortController();
    S.speedTs    = Date.now();
    S.speedBytes = 0;

    showButtons({ cancel: true });
    setBadge('downloading', '下載中', '');
    document.getElementById('legend').style.display = 'flex';

    const url = `/api/pdf/${encodeURIComponent(S.file.name)}`;
    log('req', `GET ${url}`, '(無 Range Header)');

    let res;
    try {
        // 不帶 Range → 伺服器回傳 200 + 完整檔案
        // signal 讓此 fetch 受 AbortController 控制，可隨時中止
        res = await fetch(url, { signal: S.abort.signal });
    } catch (e) {
        // AbortError 是我們自己觸發的（模擬中斷），不算真實錯誤
        if (e.name !== 'AbortError') handleError(e);
        return;
    }

    if (!res.ok) {
        handleError(new Error(`HTTP ${res.status}：請確認 PDF Server (:8081) 是否正在運行`));
        return;
    }

    // Content-Length 是完整檔案大小，用於計算進度百分比
    // 若 server 未回傳此 header，fallback 到 file-list API 的值
    const total = parseInt(res.headers.get('Content-Length')) || S.file.size;
    log('200', `200 OK`,
        `Content-Length: ${fmt(total)} · Accept-Ranges: ${res.headers.get('Accept-Ranges') || '?'}`);

    // 將 ReadableStream reader 傳給核心迴圈，isResume=false 啟用模擬中斷邏輯
    await readStream(res.body.getReader(), total, false);
}

/**
 * 續傳：帶 Range header，只請求尚未收到的部分。
 *
 * ★ 這裡是斷點續傳的關鍵，不是 UI 假象：
 *   - S.received 是第一段實際收到的 bytes 數（已存在 S.chunks 裡）
 *   - Range: bytes=S.received- 告訴伺服器「只給我從這個位置開始的資料」
 *   - 伺服器回傳 206，Content-Length 是「剩餘」大小，不是完整大小
 *   - 新收到的 chunks 直接 push 進同一個 S.chunks 陣列（接在第一段後面）
 *   - 兩段加起來才是完整檔案，沒有任何重複傳輸
 *
 * 可在 DevTools Network tab 確認：
 *   續傳請求的 Response Headers 有 Content-Range: bytes X-Y/Total
 *   且 Content-Length 只有剩餘部分的大小（不是整個檔案）
 */
async function resumeDownload() {
    if (S.phase !== 'interrupted') return;

    S.phase = 'resuming';

    // 記錄本段續傳的起點（= 中斷時已收到的量）
    // 用途：進度條要在此位置開始畫綠色區塊（區分「初次」和「續傳」兩段）
    S.resumeFrom = S.received;

    // 建立新的 AbortController（舊的已 abort，不能重用）
    S.abort      = new AbortController();
    S.speedTs    = Date.now();
    S.speedBytes = 0;

    showButtons({ cancel: true });
    setBadge('resuming', '續傳中', `從 ${fmt(S.received)} 繼續`);

    // ★ Range header 格式：bytes=起點-（省略終點 = 取到 EOF）
    // 例如已收到 4,300,000 bytes，就帶 Range: bytes=4300000-
    // 伺服器只傳送 byte 4,300,000 之後的資料，不重傳已下載的部分
    const rangeVal = `bytes=${S.received}-`;
    const url = `/api/pdf/${encodeURIComponent(S.file.name)}`;
    log('req', `GET ${url}`, `Range: ${rangeVal}`);

    let res;
    try {
        res = await fetch(url, {
            headers: { 'Range': rangeVal },
            signal: S.abort.signal,
        });
    } catch (e) {
        if (e.name !== 'AbortError') handleError(e);
        return;
    }

    // 伺服器支援 Range Request → 必須回 206 Partial Content
    // 若回 200 代表伺服器忽略了 Range header，整個檔案又從頭傳，視為異常
    if (res.status !== 206) {
        handleError(new Error(`HTTP ${res.status}：預期 206 Partial Content`));
        return;
    }

    // Content-Range: bytes 4300000-10485759/10485760 → 確認伺服器真的從斷點開始傳
    // Content-Length: 6185760                        → 只有剩餘部分的大小，驗證沒有重複傳輸
    const contentRange = res.headers.get('Content-Range') || '—';
    const contentLen   = res.headers.get('Content-Length') || '—';
    log('206', `206 Partial Content`,
        `Content-Range: ${contentRange} · Length: ${contentLen}`);

    // isResume=true：readStream 不會再模擬中斷
    // total 傳入「完整檔案大小」（不是本次 Content-Length），才能正確顯示整體進度
    await readStream(res.body.getReader(), S.file.size, true);
}

/**
 * 串流讀取核心迴圈。
 *
 * fetch() 的 response.body 是 ReadableStream，不需等整個檔案下載完畢，
 * 可以邊收邊處理，也可以在任意 chunk 邊界主動中斷。
 *
 * reader.read() 每次 await 後回傳一個 chunk：
 *   { done: false, value: Uint8Array(N) }  → 收到 N bytes 的資料片段
 *   { done: true,  value: undefined }      → 串流正常結束
 *
 * 初次下載和續傳都走同一個迴圈，差別只在 isResume 是否啟用模擬中斷。
 *
 * @param reader    fetch response.body.getReader()
 * @param total     檔案總大小（bytes），用於百分比計算
 * @param isResume  true = 續傳模式，不模擬中斷
 */
async function readStream(reader, total, isResume) {
    try {
        while (true) {
            // await 在這裡暫停，等待下一個網路封包到達，不佔用 CPU
            const { done, value } = await reader.read();

            // done=true：串流結束（正常完成 或 被 abort 後 stream 關閉）
            // 跳出後再根據 S.phase 和 S.received 判斷是真正完成還是意外中斷
            if (done) break;

            // ★ chunk 存入陣列
            // S.chunks 在整個下載過程（含續傳）共用同一個陣列
            // 第一段存 index 0~N，續傳段接著存 N+1~M，順序連續、無間隙
            S.chunks.push(value);
            S.received += value.length;  // 累計已收到的總 bytes（跨兩段請求）
            updateSpeed(value.length);
            renderProgress(total);

            // ★ 模擬中斷（僅 Demo 用，isResume=false 時才執行）
            // 注意操作順序非常重要：
            //   1. 先設 S.phase = 'interrupted'
            //   2. 再呼叫 S.abort.abort()（中斷 fetch）
            //   3. 最後 break 跳出迴圈
            // 若先 abort() 再設 phase，catch 攔截 AbortError 時 phase 還是
            // 'downloading'，catch 裡會再設一次，邏輯混亂且難以追蹤
            if (!isResume && S.phase === 'downloading' && S.received >= S.interruptAt) {
                S.phase = 'interrupted';
                S.abort.abort();  // 關閉底層 TCP 連線，停止接收後續資料
                break;
            }
        }
    } catch (e) {
        // S.abort.abort() 或使用者點「中止」都會觸發 AbortError
        // 其他網路錯誤也統一視為中斷（讓使用者可以從目前位置續傳重試）
        if (S.phase === 'downloading' || S.phase === 'resuming') {
            S.phase = 'interrupted';
        }
    }

    // ── 迴圈結束後判斷結果 ──
    if (S.phase === 'interrupted') {
        onInterrupted(total);

    } else if (S.phase === 'downloading' || S.phase === 'resuming') {
        // done=true 自然跳出：確認收到量是否符合預期（允許 1% 誤差）
        // 若遠少於預期，代表伺服器回傳了錯誤頁面或連線被切斷，視為中斷可重試
        if (total > 0 && S.received < total * 0.99) {
            S.phase = 'interrupted';
            onInterrupted(total);
        } else {
            S.phase = 'done';
            onComplete();
        }
    }
}

/**
 * 進入中斷狀態的 UI 處理。
 * 顯示已收到的 bytes 數並出現「從斷點續傳」按鈕。
 * S.chunks 裡的資料在此時仍然保留，不清除，等待後續合併使用。
 */
function onInterrupted(total) {
    const pct = (S.received / total * 100).toFixed(1);

    if (S.userCancelled) {
        // 使用者主動點「中止」→ 不自動續傳，顯示手動續傳按鈕
        showButtons({ resume: true, reset: true });
        setBadge('interrupted', '⚡ 中斷！', `已接收 ${fmt(S.received)} (${pct}%)，待續傳 ${fmt(total - S.received)}`);
        log('warn', `下載中斷`,
            `已接收 ${S.received.toLocaleString()} bytes (${pct}%)，S.chunks 保留中，可從此處續傳`);
    } else {
        // 網路/模擬中斷 → 更新重試計數，再決定是否自動續傳
        if (S.received === S.lastFailedAt) {
            // 同一個位置再次失敗 → 計數 +1
            S.retryCount++;
        } else {
            // 有推進（或第一次失敗）→ 重置計數
            S.retryCount   = 1;
            S.lastFailedAt = S.received;
        }

        if (S.retryCount >= MAX_RETRIES) {
            // 同一位置連失敗 MAX_RETRIES 次，放棄自動重試
            showButtons({ resume: true, reset: true });
            setBadge('interrupted', '⚡ 中斷！',
                `在 ${fmt(S.received)} 處連續失敗 ${S.retryCount} 次，請手動續傳或重置`);
            log('warn', `自動續傳放棄`,
                `在 ${S.received.toLocaleString()} bytes 處連續失敗 ${S.retryCount} 次`);
        } else {
            // 還在重試上限內 → 1 秒後自動續傳
            showButtons({ reset: true });
            setBadge('interrupted', '⚡ 中斷！',
                `已接收 ${fmt(S.received)} (${pct}%)，1 秒後自動續傳... (第 ${S.retryCount}/${MAX_RETRIES} 次)`);
            log('warn', `下載中斷`,
                `已接收 ${S.received.toLocaleString()} bytes (${pct}%)，自動續傳 第 ${S.retryCount}/${MAX_RETRIES} 次`);

            S.retryTimer = setTimeout(() => {
                S.retryTimer = null;
                if (S.phase === 'interrupted') resumeDownload();
            }, 1000);
        }
    }
}

/**
 * 下載完成：合併所有 chunks 並觸發瀏覽器存檔。
 *
 * ★ new Blob(S.chunks) 是合併兩段資料的關鍵：
 *   S.chunks = [ ...第一段的 Uint8Array[], ...第二段的 Uint8Array[] ]
 *   Blob 建構子接受陣列，依序串接成連續的二進位資料。
 *   結果與一次性完整下載完全相同，不會有資料缺口或重複。
 *
 * createObjectURL(blob) 在記憶體中產生臨時的 blob:// URL，
 * 用 <a download> 模擬點擊觸發瀏覽器「另存新檔」對話框。
 */
function onComplete() {
    renderProgress(S.file.size);
    setBadge('done', '✓ 完成', `共 ${fmt(S.received)}，儲存中...`);
    showButtons({ reset: true });

    // 合併：第一段（bytes 0~X）+ 續傳段（bytes X~EOF）= 完整檔案
    const blob = new Blob(S.chunks, { type: 'application/pdf' });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = S.file.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // 注意：不能立即 revokeObjectURL，瀏覽器需要一點時間讀取 blob

    log('ok', `✓ 下載完成`,
        `${fmt(blob.size)} · 由 ${S.resumeFrom ? '2' : '1'} 段請求組成`);
    if (S.resumeFrom) {
        // 印出兩段各自的 byte 範圍，驗證無重疊、無間隙
        log('info',
            `初次: bytes 0–${(S.resumeFrom - 1).toLocaleString()} `,
            `續傳: bytes ${S.resumeFrom.toLocaleString()}–${(S.received - 1).toLocaleString()}`);
    }
}

/**
 * 使用者點「中止」按鈕。
 * 先設 phase 再 abort，確保 catch 攔截時看到正確的 phase 值。
 * 中止後 S.chunks 保留，使用者仍可點「從斷點續傳」繼續。
 */
function cancelDownload() {
    S.userCancelled = true;  // 標記為使用者主動取消，onInterrupted 不會自動續傳
    S.phase = 'interrupted';
    S.abort?.abort();
}

/**
 * 顯示錯誤狀態（非 AbortError 的真實錯誤，或伺服器回傳非預期狀態碼）。
 */
function handleError(e) {
    setBadge('interrupted', '✕ 錯誤', e.message);
    showButtons({ reset: true });
    log('warn', `錯誤`, e.message);
}

// ─────────────────────────────────────────────────────────
// UI 工具函式
// ─────────────────────────────────────────────────────────

/**
 * 更新進度條的視覺呈現。
 *
 * 進度條由兩個顏色區塊疊加（CSS position: absolute）：
 *   藍色（seg-initial）：第一段下載的範圍，寬度 = resumeFrom / total
 *   綠色（seg-resumed）：續傳段的範圍，從 resumeFrom 的 x 位置開始往右延伸
 *
 * 續傳開始前（resumeFrom=0）只有藍色在增長。
 * 續傳開始後藍色寬度凍結，改由綠色從斷點處繼續延伸。
 * 兩色清楚區分「哪段是初次傳的，哪段是續傳的」。
 */
function renderProgress(total) {
    const pct = total > 0 ? S.received / total * 100 : 0;

    if (S.resumeFrom === 0) {
        // 第一段下載中：只移動藍色區塊
        document.getElementById('seg-initial').style.width = pct + '%';
    } else {
        // 續傳中：藍色凍結在斷點，綠色從斷點開始增長
        const resumePct    = S.resumeFrom / total * 100;                    // 斷點的 x 位置（%）
        const resumedWidth = (S.received - S.resumeFrom) / total * 100;     // 綠色的寬度（%）
        document.getElementById('seg-initial').style.width = resumePct + '%';
        const seg = document.getElementById('seg-resumed');
        seg.style.setProperty('--resume-left', resumePct + '%');            // CSS 變數：綠色起點
        seg.style.width = resumedWidth + '%';
    }

    document.getElementById('prog-pct').textContent = pct.toFixed(1) + '%';
    document.getElementById('prog-received').textContent = `${fmt(S.received)} / ${fmt(total)}`;
    if (S.speed > 0) {
        document.getElementById('prog-speed').textContent = fmt(S.speed) + '/s';
    }
}

/**
 * 估算目前下載速度，每 300ms 更新一次。
 * 計算公式：speed = 這段時間收到的 bytes ÷ 經過毫秒數 × 1000
 * 設定 300ms 間隔避免每個 chunk 都觸發 DOM 更新而影響效能。
 */
function updateSpeed(bytes) {
    S.speedBytes += bytes;
    const now = Date.now();
    const elapsed = now - S.speedTs;
    if (elapsed >= 300) {
        S.speed      = Math.round(S.speedBytes / elapsed * 1000);
        S.speedTs    = now;
        S.speedBytes = 0;
    }
}

/**
 * 更新狀態徽章的文字與 CSS class（控制顏色和動畫）。
 * badge-downloading：藍色脈動  badge-interrupted：紅色抖動
 * badge-resuming：綠色脈動     badge-done：綠色靜止
 */
function setBadge(phase, label, detail) {
    const badge = document.getElementById('status-badge');
    badge.className = `badge badge-${phase}`;
    badge.textContent = label;
    const d = document.getElementById('status-detail');
    d.textContent = detail;
    d.className = 'status-detail' + (phase === 'interrupted' ? ' highlight' : '');
}

function showButtons({ download = false, resume = false, cancel = false, reset = false } = {}) {
    document.getElementById('btn-download').style.display = download ? '' : 'none';
    document.getElementById('btn-resume').style.display   = resume  ? '' : 'none';
    document.getElementById('btn-cancel').style.display   = cancel  ? '' : 'none';
    document.getElementById('btn-reset').style.display    = reset   ? '' : 'none';
}

function resetState() {
    if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }
    S.chunks         = [];
    S.received       = 0;
    S.resumeFrom     = 0;
    S.phase          = 'idle';
    S.speed          = 0;
    S.abort          = null;
    S.userCancelled  = false;
    S.retryCount     = 0;
    S.lastFailedAt   = -1;

    document.getElementById('seg-initial').style.width = '0%';
    document.getElementById('seg-resumed').style.width = '0%';
    document.getElementById('prog-pct').textContent    = '0%';
    document.getElementById('prog-received').textContent = '0 B / —';
    document.getElementById('prog-speed').textContent  = '';
    document.getElementById('prog-total').textContent  = S.file ? fmt(S.file.size) : '';
    document.getElementById('legend').style.display    = 'none';
}

function resetDownload() {
    resetState();
    showButtons({ download: true });
    setBadge('idle', '待機', '點擊「開始下載」');
    log('info', '已重置');
}

// ────────────────────────────────────────────────────────────
// Log
// ────────────────────────────────────────────────────────────
function log(type, main, detail = '') {
    const box = document.getElementById('log');
    if (box.querySelector('.t-info') && box.children.length === 1) box.innerHTML = '';

    const time = new Date().toTimeString().slice(0, 8);
    const cls  = { req:'le-req', '200':'le-200', '206':'le-206', warn:'le-warn', ok:'le-ok', info:'le-info' }[type] || '';
    const mc   = { req:'t-req', '200':'t-200',   '206':'t-206',  warn:'t-warn', ok:'t-ok',  info:'t-info'  }[type] || 't-dim';

    const entry = document.createElement('div');
    entry.className = `le ${cls}`;
    entry.innerHTML =
        `<span class="t-time">${time}</span> ` +
        `<span class="${mc}">${main}</span>` +
        (detail ? ` <span class="t-dim">${detail}</span>` : '');
    box.appendChild(entry);
    box.scrollTop = box.scrollHeight;
}

function clearLog() {
    document.getElementById('log').innerHTML =
        '<div class="le le-info"><span class="t-info">等待操作...</span></div>';
}

function fmt(b) {
    if (!b && b !== 0) return '—';
    if (b < 1024)      return b + ' B';
    if (b < 1048576)   return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
}

loadFiles();
</script>
